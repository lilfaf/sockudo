name: Fuzz Smoke

on:
  workflow_dispatch: {}
  schedule:
    - cron: "23 3 * * *"
  pull_request:
    paths:
      - "crates/sockudo-protocol/**"
      - "crates/sockudo-adapter/src/handler/**"
      - "fuzz/**"
      - ".github/workflows/fuzz-smoke.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz-smoke:
    name: Parser Fuzz Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: AI header validator smoke
        run: cargo fuzz run ai_header_validator -- -max_total_time=30

      - name: Wire message parser smoke
        run: cargo fuzz run wire_message -- -max_total_time=30
